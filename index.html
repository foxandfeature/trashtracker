<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Permissions-Policy" content="magnetometer=(self)">
    <title>TrashTracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="icons/icons.js"></script>
    <script src="locations.js"></script
</head>

<body>
    <div id="map"></div>
    <script src="map.js"></script>
    <button id="location-button" type="button">
        <span class="material-symbols-outlined">my_location</span>
    </button>
    <div id="ios-magnetometer-request-menu">
        <p>Damit TrashTracker deinen Standort richtig anzeigen kann, wird empfohlen, TrashTracker Zugriff auf die Sensordaten zu gewähren.</p>
        <button id="ios-magnetometer-request-menu-button" onclick="startCompass()">Okay</button>
    </div>
    <script src="ui.js"></script>
    <script src="compass.js"></script>
</body>

</html>
